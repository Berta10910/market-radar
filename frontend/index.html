<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Market Radar</title>

<style>

body{
background:#0b0f19;
color:white;
font-family:Arial;
text-align:center;
}

.card{
background:#1a1f2e;
margin:20px;
padding:20px;
border-radius:15px;
}

.price{
font-size:28px;
}

</style>

</head>

<body>

<h1>Market Radar</h1>

<div class="card">
<h2>Oil</h2>
<div id="brent" class="price"></div>
<div id="wti" class="price"></div>
</div>

<div class="card">
<h2>Markets</h2>
<div id="sp500" class="price"></div>
<div id="nasdaq" class="price"></div>
</div>

<div class="card">
<h2>Gold</h2>
<div id="gold" class="price"></div>
</div>

<script>

async function loadPrices(){

const response = await fetch("https://market-radar-nz0y.onrender.com/prices");

const data = await response.json();

document.getElementById("brent").innerHTML="Brent: "+data.brent
document.getElementById("wti").innerHTML="WTI: "+data.wti
document.getElementById("sp500").innerHTML="S&P500: "+data.sp500
document.getElementById("nasdaq").innerHTML="Nasdaq: "+data.nasdaq
document.getElementById("gold").innerHTML="Gold: "+data.gold

}

loadPrices()

setInterval(loadPrices,30000)

</script>

</body>
</html>
